services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-warehouse_dms}
      POSTGRES_USER: ${POSTGRES_USER:-wdms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wdms_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wdms_user} -d ${POSTGRES_DB:-warehouse_dms}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    # Use Uvicorn (ASGI) so StreamingHttpResponse SSE endpoints work correctly.
    # Gunicorn sync workers time out on long-lived connections.
    command: >
      uvicorn warehouse_dms.asgi:application
        --host 0.0.0.0
        --port 8000
        --workers 4
        --timeout-keep-alive 120
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_files:/app/media
      - log_files:/app/logs

  worker:
    build: .
    restart: unless-stopped
    command: celery -A warehouse_dms worker --loglevel=info --concurrency=4
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_files:/app/media
      - log_files:/app/logs

  beat:
    build: .
    restart: unless-stopped
    command: celery -A warehouse_dms beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - log_files:/app/logs

volumes:
  postgres_data:
  media_files:
  log_files:
